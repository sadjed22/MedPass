<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Card Request Status - MedPass</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyC8Q0_KTrSHYjQxLUJYtst1NU4g-V8tz8s",
  authDomain: "med1-1931d.firebaseapp.com",
  projectId: "med1-1931d",
  storageBucket: "med1-1931d.firebasestorage.app",
  messagingSenderId: "358197809853",
  appId: "1:358197809853:web:9462e23af83a83b1deddd4"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

document.documentElement.style.visibility = "hidden";
auth.onAuthStateChanged(async (user) => {
  if (!user) { window.location.replace("login_page.html"); return; }
  try {
    const snap = await db.collection("users").doc(user.uid).get();
    if (!snap.exists) { await auth.signOut(); window.location.replace("login_page.html"); return; }
    const profile = snap.data();
    const allowed = ["Admin", "Hospital"];
    if (!allowed.includes(profile.role) || profile.status === "inactive") {
      await auth.signOut(); window.location.replace("login_page.html"); return;
    }
    document.documentElement.style.visibility = "visible";
    loadCardRequests();
  } catch(e) { window.location.replace("login_page.html"); }
});
async function logout() { await auth.signOut(); window.location.replace("login_page.html"); }
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#2DC98E;
  --blue:#3B82F6;
  --purple:#8B5CF6;
  --teal:#14B8A6;
  --red:#EF4444;
  --text:#1a1a2e;
  --muted:#6B7280;
  --border:#E5E7EB;
  --white:#FFFFFF;
}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#F0F7F4 0%,#F5F3FF 100%);
  min-height:100vh;
  margin:0;
  padding:0;
}

/* ── NAVBAR ── */
.navbar{
  background:#fff;
  padding:16px 40px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  position:sticky;
  top:0;
  z-index:100;
}

.nav-brand{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  font-size:20px;
  font-weight:700;
}

.nav-brand-icon{
  width:32px;
  height:32px;
  background:var(--green);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:18px;
}

.nav-brand-text{
  color:var(--green);
  letter-spacing:-0.5px;
}

.nav-brand-sub{
  font-size:11px;
  color:var(--muted);
  font-weight:400;
  display:block;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:24px;
}

.nav-link{
  display:flex;
  align-items:center;
  gap:6px;
  text-decoration:none;
  color:var(--text);
  font-weight:500;
  font-size:14px;
  transition:color .2s;
}

.nav-link:hover{
  color:var(--green);
}

/* ── MAIN CONTENT ── */
.container{
  max-width:1100px;
  margin:0 auto;
  padding:40px 20px;
}

.page-header{
  margin-bottom:40px;
}

.back-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 16px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  text-decoration:none;
  font-weight:500;
  font-size:14px;
  cursor:pointer;
  transition:all .2s;
  margin-bottom:20px;
}

.back-btn:hover{
  background:#f9fafb;
  border-color:var(--muted);
}

.page-title{
  display:inline-block;
  background:var(--green);
  color:#fff;
  padding:12px 24px;
  border-radius:12px;
  font-size:20px;
  font-weight:700;
  letter-spacing:-0.5px;
}

/* ── TABLE ── */
.table-card{
  background:#fff;
  border-radius:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  overflow:hidden;
  margin-bottom:40px;
}

.table-header{
  background:linear-gradient(90deg,var(--green) 0%,var(--teal) 100%);
  padding:16px 24px;
  display:grid;
  grid-template-columns:1fr 1.5fr 1.2fr 1fr 1.2fr 1fr;
  gap:16px;
  color:#fff;
  font-weight:600;
  font-size:13px;
  letter-spacing:0.5px;
}

.table-row{
  padding:16px 24px;
  display:grid;
  grid-template-columns:1fr 1.5fr 1.2fr 1fr 1.2fr 1fr;
  gap:16px;
  border-bottom:1px solid var(--border);
  align-items:center;
  transition:background .2s;
}

.table-row:hover{
  background:#f9fafb;
}

.table-row:last-child{
  border-bottom:none;
}

.table-cell{
  font-size:14px;
  color:var(--text);
}

.request-id{
  color:var(--blue);
  font-weight:600;
}

.status-badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:8px;
  font-size:12px;
  font-weight:600;
  text-align:center;
}

.status-pending{
  background:rgba(245,158,11,.1);
  color:#D97706;
}

.status-sent{
  background:rgba(59,130,246,.1);
  color:var(--blue);
}

.status-received{
  background:rgba(45,201,142,.1);
  color:var(--green);
}

.action-btn{
  background:var(--green);
  color:#fff;
  border:none;
  padding:8px 16px;
  border-radius:8px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s;
}

.action-btn:hover{
  background:#24a67a;
  transform:translateY(-2px);
}

.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
}

.empty-state-icon{
  font-size:64px;
  margin-bottom:16px;
}

.empty-state-title{
  font-size:18px;
  font-weight:600;
  color:var(--text);
  margin-bottom:8px;
}

/* STATS ROW */
.stats-row{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
.stat-pill{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#fff;border-radius:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);font-size:13px;font-weight:600;color:var(--text);}
.stat-dot{width:8px;height:8px;border-radius:50%;}
.stat-dot.pending{background:#F59E0B;}
.stat-dot.sent{background:var(--blue);}
.stat-dot.received{background:var(--green);}

/* FILTER TABS */
.filter-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.filter-tab{padding:8px 16px;border:1.5px solid var(--border);border-radius:20px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--muted);}
.filter-tab.active{background:var(--green);border-color:var(--green);color:#fff;}
.filter-tab:hover:not(.active){border-color:#9CA3AF;color:var(--text);}

/* SKELETON */
.skeleton-row{padding:16px 24px;display:grid;grid-template-columns:1fr 1.5fr 1.2fr 1fr 1.2fr 1fr;gap:16px;border-bottom:1px solid var(--border);}
.skel{height:14px;background:#E5E7EB;border-radius:6px;animation:pulse 1.3s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* STATUS DROPDOWN */
.status-select{padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;transition:border-color .2s;}
.status-select:focus{outline:none;border-color:var(--green);}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:#1a1a2e;color:#fff;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:999;display:flex;align-items:center;gap:10px;transform:translateY(80px);opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);min-width:260px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-left:4px solid var(--green);}
.toast.error{border-left:4px solid var(--red);}

/* ── RESPONSIVE ── */
@media(max-width:1024px){
  .table-header,
  .table-row{
    grid-template-columns:1fr 1fr;
  }
}

@media(max-width:768px){
  .table-header,
  .table-row{
    grid-template-columns:1fr;
    gap:12px;
  }
  
  .table-header{
    display:none;
  }
  
  .table-row{
    padding:20px;
    margin-bottom:12px;
    border:1px solid var(--border);
    border-bottom:1px solid var(--border);
  }
  
  .table-cell::before{
    content:attr(data-label);
    display:block;
    font-size:12px;
    color:var(--muted);
    font-weight:600;
    margin-bottom:4px;
  }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="#" class="nav-brand" onclick="goHome(event)">
    <div class="nav-brand-icon">🏥</div>
    <div>
      <div class="nav-brand-text">MedPass</div>
      <span class="nav-brand-sub">Hospital Portal</span>
    </div>
  </a>
  <div class="nav-right">
    <a href="home_page.html" class="nav-link">Home</a>
    <a href="login_page.html" class="nav-link">Logout</a>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container">
  <div class="page-header">
    <a href="admin_dashboard.html" class="back-btn">← Back</a>
    <div class="page-title">📋 Card Request Status</div>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-pill"><div class="stat-dot pending"></div><span id="countPending">0 pending</span></div>
    <div class="stat-pill"><div class="stat-dot sent"></div><span id="countSent">0 sent</span></div>
    <div class="stat-pill"><div class="stat-dot received"></div><span id="countReceived">0 received</span></div>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
    <button class="filter-tab" onclick="setFilter('pending',this)">⏳ Pending</button>
    <button class="filter-tab" onclick="setFilter('sent',this)">📬 Sent</button>
    <button class="filter-tab" onclick="setFilter('received',this)">✅ Received</button>
  </div>

  <div class="table-card">
    <div class="table-header">
      <div>Request ID</div>
      <div>Patient Name</div>
      <div>Request Date</div>
      <div>Status</div>
      <div>Est. Delivery</div>
      <div>Actions</div>
    </div>
    <div id="tableBody">
      <div class="skeleton-row"><div class="skel" style="width:70%"></div><div class="skel" style="width:60%"></div><div class="skel" style="width:55%"></div><div class="skel" style="width:50%"></div><div class="skel" style="width:60%"></div><div class="skel" style="width:80%"></div></div>
      <div class="skeleton-row"><div class="skel" style="width:65%"></div><div class="skel" style="width:75%"></div><div class="skel" style="width:60%"></div><div class="skel" style="width:45%"></div><div class="skel" style="width:55%"></div><div class="skel" style="width:70%"></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allRequests = [];
let currentFilter = 'all';

function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

async function loadCardRequests() {
  try {
    const snap = await db.collection('cardRequests')
      .orderBy('createdAt', 'desc')
      .limit(200)
      .get();
    allRequests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats();
    renderTable();
  } catch(err) {
    document.getElementById('tableBody').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">⚠️</div>
        <div class="empty-state-title">Failed to load card requests</div>
        <p style="font-size:13px;color:var(--muted)">${err.message}</p>
      </div>`;
  }
}

function updateStats() {
  document.getElementById('countPending').textContent  = `${allRequests.filter(r=>r.status==='pending').length} pending`;
  document.getElementById('countSent').textContent     = `${allRequests.filter(r=>r.status==='sent').length} sent`;
  document.getElementById('countReceived').textContent = `${allRequests.filter(r=>r.status==='received').length} received`;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function renderTable() {
  const filtered = currentFilter === 'all' ? allRequests : allRequests.filter(r => r.status === currentFilter);
  const tbody = document.getElementById('tableBody');

  if (filtered.length === 0) {
    tbody.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">${currentFilter === 'pending' ? '🎉' : '📭'}</div>
        <div class="empty-state-title">${currentFilter === 'pending' ? 'No pending card requests!' : 'No card requests found'}</div>
        <p style="font-size:14px;color:var(--muted)">Card requests are created automatically when a patient account is approved.</p>
      </div>`;
    return;
  }

  tbody.innerHTML = filtered.map(req => {
    const statusBadge = req.status === 'pending'
      ? `<span class="status-badge status-pending">Pending</span>`
      : req.status === 'sent'
        ? `<span class="status-badge status-sent">Sent</span>`
        : `<span class="status-badge status-received">Received</span>`;

    const actionCell = req.status === 'received'
      ? `<button class="action-btn" onclick="sendSMS('${req.id}','${req.patientName}')">💬 Send SMS</button>`
      : `<select class="status-select" onchange="updateStatus('${req.id}',this.value)" title="Update status">
           <option value="">Update status…</option>
           ${req.status !== 'sent'     ? `<option value="sent">Mark as Sent</option>` : ''}
           ${req.status !== 'received' ? `<option value="received">Mark as Received</option>` : ''}
           ${req.status !== 'pending'  ? `<option value="pending">Reset to Pending</option>` : ''}
         </select>`;

    return `<div class="table-row">
      <div class="table-cell request-id" data-label="Request ID">${req.cardReqId || req.id}</div>
      <div class="table-cell" data-label="Patient Name">${req.patientName || '—'}</div>
      <div class="table-cell" data-label="Request Date">${fmtDate(req.requestDate)}</div>
      <div class="table-cell" data-label="Status">${statusBadge}</div>
      <div class="table-cell" data-label="Est. Delivery">${req.estDelivery || '—'}</div>
      <div class="table-cell">${actionCell}</div>
    </div>`;
  }).join('');
}

async function updateStatus(docId, newStatus) {
  if (!newStatus) return;
  try {
    const update = { status: newStatus, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
    if (newStatus === 'received') update.estDelivery = '—';
    await db.collection('cardRequests').doc(docId).update(update);
    const idx = allRequests.findIndex(r => r.id === docId);
    if (idx !== -1) { allRequests[idx].status = newStatus; if (newStatus === 'received') allRequests[idx].estDelivery = '—'; }
    updateStats();
    renderTable();
    showToast(`Card status updated to "${newStatus}"`, 'success');
  } catch(err) {
    showToast('Error: ' + err.message, 'error');
  }
}

function sendSMS(docId, patientName) {
  showToast(`SMS notification sent for ${patientName || docId}`, 'success');
}

function goHome(event) {
  if (event) event.preventDefault();
  window.location.href = 'home_page.html';
}

function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}
</script>

</body>
</html>
