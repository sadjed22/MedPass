  messagingSenderId: "358197809853",

};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

document.documentElement.style.visibility = "hidden";
auth.onAuthStateChanged(async (user) => {
  if (!user) { window.location.replace("login_page.html"); return; }
  try {
    const snap = await db.collection("users").doc(user.uid).get();
    if (!snap.exists) { await auth.signOut(); window.location.replace("login_page.html"); return; }
    const profile = snap.data();
    if (profile.role !== "Admin" || profile.status === "inactive") {
      await auth.signOut(); window.location.replace("login_page.html"); return;
    }
    document.documentElement.style.visibility = "visible";
    loadAllData();
  } catch(e) { window.location.replace("login_page.html"); }
});
async function logout() { await auth.signOut(); window.location.replace("login_page.html"); }

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#2DC98E;--blue:#3B82F6;--purple:#8B5CF6;
  --teal:#14B8A6;--red:#EF4444;--orange:#F97316;
  --text:#1a1a2e;--muted:#6B7280;--border:#E5E7EB;--white:#fff;--dark:#2B3E50;
}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#F0F7F4 0%,#F5F3FF 100%);min-height:100vh;margin:0;}

/* NAVBAR */
.navbar{background:#fff;padding:16px 40px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);position:sticky;top:0;z-index:100;}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;font-size:20px;font-weight:700;}
.nav-brand-icon{width:32px;height:32px;background:var(--dark);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;}
.nav-brand-text{color:var(--dark);letter-spacing:-0.5px;}
.nav-brand-sub{font-size:11px;color:var(--muted);font-weight:400;display:block;}
.nav-right{display:flex;align-items:center;gap:24px;}
.nav-link{text-decoration:none;color:var(--text);font-weight:500;font-size:14px;transition:color .2s;}
.nav-link:hover{color:var(--dark);}
.btn-logout{display:flex;align-items:center;gap:6px;padding:8px 16px;background:#FEF2F2;color:#DC2626;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-logout:hover{background:#FEE2E2;}

/* LAYOUT */
.container{max-width:1200px;margin:0 auto;padding:40px 20px;}
.page-header{margin-bottom:32px;}
.back-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;background:#fff;border:1px solid var(--border);border-radius:10px;color:var(--text);text-decoration:none;font-weight:500;font-size:14px;cursor:pointer;transition:all .2s;margin-bottom:20px;}
.back-btn:hover{background:#f9fafb;border-color:var(--muted);}
.page-title{display:inline-block;background:var(--orange);color:#fff;padding:12px 24px;border-radius:12px;font-size:20px;font-weight:700;letter-spacing:-0.5px;}

/* MONTH SELECTOR */
.month-bar{display:flex;align-items:center;gap:12px;margin-bottom:28px;flex-wrap:wrap;}
.month-bar label{font-size:13px;font-weight:600;color:var(--muted);}
.month-select{padding:8px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;background:#fff;color:var(--text);cursor:pointer;transition:border-color .2s;}
.month-select:focus{outline:none;border-color:var(--orange);}
.refresh-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:#fff;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;margin-left:auto;}
.refresh-btn:hover{background:#F9FAFB;border-color:#9CA3AF;}
.refresh-btn.spinning svg{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* SECTION TITLES */
.section-title{font-size:16px;font-weight:700;color:var(--text);margin:36px 0 18px;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;margin-bottom:8px;}
.stat-card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 2px 8px rgba(0,0,0,.06);position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px;}
.stat-card.blue::before{background:var(--blue);}
.stat-card.purple::before{background:var(--purple);}
.stat-card.green::before{background:var(--green);}
.stat-card.orange::before{background:var(--orange);}
.stat-card.teal::before{background:var(--teal);}
.stat-card.red::before{background:var(--red);}
.stat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.stat-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.stat-icon.blue{background:rgba(59,130,246,.1);}
.stat-icon.purple{background:rgba(139,92,246,.1);}
.stat-icon.green{background:rgba(45,201,142,.1);}
.stat-icon.orange{background:rgba(249,115,22,.1);}
.stat-icon.teal{background:rgba(20,184,166,.1);}
.stat-icon.red{background:rgba(239,68,68,.1);}
.stat-trend{font-size:12px;font-weight:700;padding:3px 8px;border-radius:20px;}
.stat-trend.up{background:#D1FAE5;color:#065F46;}
.stat-trend.down{background:#FEE2E2;color:#991B1B;}
.stat-trend.neutral{background:#F3F4F6;color:#374151;}
.stat-number{font-size:34px;font-weight:800;color:var(--text);letter-spacing:-1px;margin-bottom:4px;line-height:1;}
.stat-label{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.stat-period{font-size:11px;color:#9CA3AF;}

/* SKELETON */
.skel{background:linear-gradient(90deg,#F3F4F6 25%,#E5E7EB 50%,#F3F4F6 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:6px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-num{height:34px;width:60%;margin-bottom:6px;}
.skel-lbl{height:12px;width:80%;}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:8px;}
.chart-card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.chart-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;}
.chart-subtitle{font-size:12px;color:var(--muted);font-weight:400;}
.chart-wrap{position:relative;height:220px;}

/* INFO CARDS */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:8px;}
.info-card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.info-card h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F9FAFB;font-size:13px;}
.info-row:last-child{border-bottom:none;}
.info-label{color:var(--muted);font-weight:500;}
.info-value{color:var(--text);font-weight:700;}
.info-value.green{color:var(--green);}
.info-value.blue{color:var(--blue);}
.info-value.orange{color:var(--orange);}
.info-value.red{color:var(--red);}
.info-value.purple{color:var(--purple);}

/* ACTIVITY TIMELINE */
.timeline-card{background:#fff;border-radius:14px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:40px;}
.timeline-card h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;}
.timeline-list{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid #F9FAFB;position:relative;}
.tl-item:last-child{border-bottom:none;}
.tl-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:2px;}
.tl-dot.blue{background:rgba(59,130,246,.12);}
.tl-dot.green{background:rgba(45,201,142,.12);}
.tl-dot.purple{background:rgba(139,92,246,.12);}
.tl-dot.orange{background:rgba(249,115,22,.12);}
.tl-dot.red{background:rgba(239,68,68,.12);}
.tl-content{flex:1;}
.tl-text{font-size:13px;color:var(--text);font-weight:500;margin-bottom:3px;line-height:1.4;}
.tl-meta{font-size:11px;color:var(--muted);}
.tl-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-left:6px;}
.tl-badge.repl{background:#FEF3C7;color:#92400E;}
.no-activity{text-align:center;padding:32px;color:var(--muted);font-size:13px;}

/* PROGRESS BAR */
.prog-wrap{margin-top:6px;}
.prog-bar{height:6px;background:#F3F4F6;border-radius:3px;overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;border-radius:3px;transition:width .8s ease;}

@media(max-width:900px){.charts-grid{grid-template-columns:1fr;}}
@media(max-width:768px){.navbar{padding:16px 20px;}.container{padding:20px 16px;}.stats-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr;}}
</style>
</head>

<script>
// ── MONTH SELECTOR SETUP ──────────────────────────────────────
const now = new Date();
function buildMonthOptions() {
  const sel = document.getElementById('monthSelect');
  sel.innerHTML = '';
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const lbl = d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = lbl;
    if (i === 0) opt.selected = true;
    sel.appendChild(opt);
  }
}
buildMonthOptions();

function getSelectedRange() {
  const [y, m] = document.getElementById('monthSelect').value.split('-').map(Number);
  const start = new Date(y, m - 1, 1);
  const end   = new Date(y, m, 1);
  return { start, end,
    startTs: firebase.firestore.Timestamp.fromDate(start),
    endTs:   firebase.firestore.Timestamp.fromDate(end),
    label:   start.toLocaleDateString('en-GB',{month:'long',year:'numeric'})
  };
}

function onMonthChange() { loadAllData(); }

// ── CHARTS INSTANCES ──────────────────────────────────────────
let chartReqInst = null;
let chartStaInst = null;

// ── MAIN LOAD ─────────────────────────────────────────────────
async function loadAllData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  const range = getSelectedRange();
  document.getElementById('monthLabel').textContent = '— ' + range.label;

  try {
    // Fetch all collections in parallel
    const [cardSnap, patientSnap, usersSnap] = await Promise.all([
      db.collection('cardRequests').get(),
      db.collection('patientRequests').get(),
      db.collection('users').get()   // all roles — used for timeline & patient count
    ]);

    const allCards    = cardSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const allPatReq   = patientSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const allUsers    = usersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const allPatients = allUsers.filter(u => u.role === 'Patient');

    // Filter to selected month
    const inRange = (ts) => {
      if (!ts) return false;
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d >= range.start && d < range.end;
    };

    const monthCards   = allCards.filter(r => inRange(r.createdAt));
    const monthPatReq  = allPatReq.filter(r => inRange(r.createdAt || r.submittedAt));

    // KPIs
    const totalCardReq   = monthCards.length;
    const cardsSent      = monthCards.filter(r => r.status === 'sent' || r.status === 'received').length;
    const cardsReceived  = monthCards.filter(r => r.status === 'received').length;
    const replacements   = monthCards.filter(r => r.isReplacement).length;
    const patReqTotal    = monthPatReq.length;
    const patReqPending  = monthPatReq.filter(r => r.status === 'pending').length;

    // Total across all time
    const totalPendingCards = allCards.filter(r => r.status === 'pending').length;
    const totalActivePatients = allPatients.filter(p => p.status === 'active' || p.status === 'approved').length;

    renderStats({
      totalCardReq, cardsSent, cardsReceived, replacements, patReqTotal, patReqPending,
      totalPendingCards, totalActivePatients
    }, range);

    renderInfoCards(allCards, monthCards, allPatReq, monthPatReq);
    renderTrendChart(allCards);
    renderStatusChart(allCards);
    renderTimeline(allCards, allPatReq, allUsers, range);

  } catch(err) {
    console.error(err);
  }
  btn.classList.remove('spinning');
}

// ── RENDER STATS ──────────────────────────────────────────────
function renderStats(d, range) {
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = `
    ${statCard('blue','👥', d.totalCardReq, 'New Card Requests', range.label, '')}
    ${statCard('purple','📦', d.cardsSent, 'Cards Sent', range.label, '')}
    ${statCard('green','✅', d.cardsReceived, 'Cards Received', range.label, '')}
    ${statCard('teal','🔄', d.replacements, 'Replacement Requests', range.label, '')}
    ${statCard('orange','📋', d.patReqTotal, 'Patient Account Requests', range.label, '')}
    ${statCard('red','⏳', d.totalPendingCards, 'Cards Awaiting Dispatch', 'All time', '')}
  `;
}

function statCard(color, icon, num, label, period, trend) {
  return `<div class="stat-card ${color}">
    <div class="stat-header">
      <div class="stat-icon ${color}">${icon}</div>
      ${trend ? `<span class="stat-trend ${trend.startsWith('↑')?'up':'down'}">${trend}</span>` : ''}
    </div>
    <div class="stat-number">${num.toLocaleString()}</div>
    <div class="stat-label">${label}</div>
    <div class="stat-period">${period}</div>
  </div>`;
}

// ── RENDER INFO CARDS ─────────────────────────────────────────
function renderInfoCards(allCards, monthCards, allPatReq, monthPatReq) {
  // Card delivery rates
  const totalSent     = allCards.filter(r=>r.status==='sent'||r.status==='received').length;
  const totalReceived = allCards.filter(r=>r.status==='received').length;
  const totalPending  = allCards.filter(r=>r.status==='pending').length;
  const delivRate     = totalSent > 0 ? Math.round((totalReceived/totalSent)*100) : 0;

  // Patient requests
  const prApproved = allPatReq.filter(r=>r.status==='approved').length;
  const prRejected = allPatReq.filter(r=>r.status==='rejected').length;
  const prPending  = allPatReq.filter(r=>r.status==='pending').length;
  const approvalRate = (prApproved+prRejected) > 0 ? Math.round((prApproved/(prApproved+prRejected))*100) : 0;

  // Replacement requests
  const replAll       = allCards.filter(r=>r.isReplacement);
  const replPending   = replAll.filter(r=>r.status==='pending').length;
  const replSent      = replAll.filter(r=>r.status==='sent').length;
  const replReceived  = replAll.filter(r=>r.status==='received').length;
  const replReasons   = {};
  replAll.forEach(r=>{ const k=r.replacementReason||'Other'; replReasons[k]=(replReasons[k]||0)+1; });
  const topReason = Object.entries(replReasons).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('infoGrid').innerHTML = `
    <div class="info-card">
      <h3>Card Delivery (All Time)</h3>
      <div class="info-row"><span class="info-label">Total Pending</span><span class="info-value orange">${totalPending}</span></div>
      <div class="info-row"><span class="info-label">Total Sent</span><span class="info-value blue">${totalSent}</span></div>
      <div class="info-row"><span class="info-label">Total Received</span><span class="info-value green">${totalReceived}</span></div>
      <div class="info-row"><span class="info-label">Delivery Rate</span>
        <span class="info-value ${delivRate>=80?'green':delivRate>=50?'orange':'red'}">${delivRate}%</span>
      </div>
      <div class="prog-wrap">
        <div class="prog-bar"><div class="prog-fill" style="width:${delivRate}%;background:var(--green)"></div></div>
      </div>
    </div>

    <div class="info-card">
      <h3>Patient Requests (All Time)</h3>
      <div class="info-row"><span class="info-label">Pending</span><span class="info-value orange">${prPending}</span></div>
      <div class="info-row"><span class="info-label">Approved</span><span class="info-value green">${prApproved}</span></div>
      <div class="info-row"><span class="info-label">Rejected</span><span class="info-value red">${prRejected}</span></div>
      <div class="info-row"><span class="info-label">Approval Rate</span>
        <span class="info-value ${approvalRate>=80?'green':approvalRate>=50?'orange':'red'}">${approvalRate}%</span>
      </div>
      <div class="prog-wrap">
        <div class="prog-bar"><div class="prog-fill" style="width:${approvalRate}%;background:var(--blue)"></div></div>
      </div>
    </div>

    <div class="info-card">
      <h3>Replacement Requests (All Time)</h3>
      <div class="info-row"><span class="info-label">Total</span><span class="info-value purple">${replAll.length}</span></div>
      <div class="info-row"><span class="info-label">Pending</span><span class="info-value orange">${replPending}</span></div>
      <div class="info-row"><span class="info-label">Sent</span><span class="info-value blue">${replSent}</span></div>
      <div class="info-row"><span class="info-label">Received</span><span class="info-value green">${replReceived}</span></div>
      ${topReason ? `<div class="info-row"><span class="info-label">Top reason</span><span class="info-value" style="font-size:12px">${topReason[0]} (${topReason[1]})</span></div>` : ''}
    </div>
  `;
}

// ── TREND CHART — last 6 months ───────────────────────────────
function renderTrendChart(allCards) {
  const labels = [];
  const origData = [];
  const replData = [];

  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const end = new Date(now.getFullYear(), now.getMonth() - i + 1, 1);
    labels.push(d.toLocaleDateString('en-GB',{month:'short',year:'2-digit'}));
    const month = allCards.filter(r => {
      const ts = r.createdAt?.toDate?.() || (r.createdAt ? new Date(r.createdAt) : null);
      return ts && ts >= d && ts < end;
    });
    origData.push(month.filter(r=>!r.isReplacement).length);
    replData.push(month.filter(r=>r.isReplacement).length);
  }

  if (chartReqInst) chartReqInst.destroy();
  const ctx = document.getElementById('chartRequests').getContext('2d');
  chartReqInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'New Cards', data: origData, backgroundColor: 'rgba(59,130,246,.75)', borderRadius: 6 },
        { label: 'Replacements', data: replData, backgroundColor: 'rgba(249,115,22,.75)', borderRadius: 6 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 12 } } },
      scales: {
        x: { stacked: true, grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } }, grid: { color: '#F3F4F6' } }
      }
    }
  });
}

// ── STATUS DONUT CHART ────────────────────────────────────────
function renderStatusChart(allCards) {
  const pending  = allCards.filter(r=>r.status==='pending').length;
  const sent     = allCards.filter(r=>r.status==='sent').length;
  const received = allCards.filter(r=>r.status==='received').length;

  if (chartStaInst) chartStaInst.destroy();
  const ctx = document.getElementById('chartStatus').getContext('2d');
  chartStaInst = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Pending', 'Sent', 'Received'],
      datasets: [{
        data: [pending, sent, received],
        backgroundColor: ['#FEF3C7', '#DBEAFE', '#D1FAE5'],
        borderColor: ['#F59E0B', '#3B82F6', '#2DC98E'],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 12 }, boxWidth: 14, padding: 16 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed}` } }
      }
    }
  });
  document.getElementById('chartSubB').textContent = `${allCards.length} total`;
}

// ── ACTIVITY TIMELINE ─────────────────────────────────────────
function renderTimeline(allCards, allPatReq, allUsers, range) {
  // Build unified events from cardRequests + patientRequests, sorted by date desc
  const events = [];

  allCards.forEach(r => {
    const ts = r.createdAt?.toDate?.() || (r.createdAt ? new Date(r.createdAt) : null);
    if (!ts) return;
    const isRepl = r.isReplacement;
    events.push({
      ts,
      icon: isRepl ? '🔄' : '📋',
      color: isRepl ? 'orange' : 'purple',
      text: isRepl
        ? `Replacement card requested for <strong>${r.patientName||'—'}</strong> (${r.replacementReason||'—'})`
        : `Card request created for <strong>${r.patientName||'—'}</strong>`,
      meta: `${r.hospitalName||''}  ·  Status: ${r.status}`,
      repl: isRepl
    });
    // If status changed to sent or received, add that event too (approximate via updatedAt)
    if ((r.status === 'sent' || r.status === 'received') && r.updatedAt) {
      const uts = r.updatedAt.toDate?.() || new Date(r.updatedAt);
      events.push({
        ts: uts,
        icon: r.status === 'received' ? '✅' : '📬',
        color: r.status === 'received' ? 'green' : 'blue',
        text: r.status === 'received'
          ? `Card <strong>received</strong> by <strong>${r.patientName||'—'}</strong>`
          : `Card <strong>sent</strong> to <strong>${r.patientName||'—'}</strong>`,
        meta: r.hospitalName || '',
        repl: false
      });
    }
  });

  allPatReq.forEach(r => {
    const ts = r.createdAt?.toDate?.() || (r.createdAt ? new Date(r.createdAt) : null);
    if (!ts) return;
    events.push({
      ts,
      icon: r.status === 'approved' ? '✅' : r.status === 'rejected' ? '❌' : '👥',
      color: r.status === 'approved' ? 'green' : r.status === 'rejected' ? 'red' : 'blue',
      text: `Patient account request — <strong>${r.name||r.patientName||'—'}</strong> <span style="text-transform:capitalize">(${r.status})</span>`,
      meta: r.hospitalName || '',
      repl: false
    });
  });

  // User creation events — every role
  const roleIcons = {
    'Patient':'👤', 'Hospital':'🏥', 'Doctor':'👨‍⚕️',
    'Pharmacy':'💊', 'Blood Analysis Center':'🧪',
    'Radiology Center':'📷', 'Admin':'🛡️'
  };
  const roleColors = {
    'Patient':'purple', 'Hospital':'green', 'Doctor':'blue',
    'Pharmacy':'teal', 'Blood Analysis Center':'teal',
    'Radiology Center':'teal', 'Admin':'orange'
  };
  allUsers.forEach(u => {
    const ts = u.createdAt?.toDate?.() || (u.createdAt ? new Date(u.createdAt) : null);
    if (!ts) return;
    const role  = u.role || 'User';
    const icon  = roleIcons[role]  || '👤';
    const color = roleColors[role] || 'blue';
    events.push({
      ts,
      icon,
      color,
      text: `New <strong>${role}</strong> account created — <strong>${u.name || u.email || '—'}</strong>`,
      meta: u.email || '',
      repl: false
    });
  });

  events.sort((a,b) => b.ts - a.ts);
  const recent = events.slice(0, 20);

  document.getElementById('activityCount').textContent = `${recent.length} events shown`;

  if (recent.length === 0) {
    document.getElementById('timelineList').innerHTML = `<div class="no-activity">No activity found.</div>`;
    return;
  }

  document.getElementById('timelineList').innerHTML = recent.map(e => `
    <div class="tl-item">
      <div class="tl-dot ${e.color}">${e.icon}</div>
      <div class="tl-content">
        <div class="tl-text">${e.text}${e.repl?'<span class="tl-badge repl">Replacement</span>':''}</div>
        <div class="tl-meta">${fmtTs(e.ts)}${e.meta?' · '+e.meta:''}</div>
      </div>
    </div>
  `).join('');
}

function fmtTs(d) {
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) + ' at ' +
         d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
