<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subscription Plans - Public Hospital - MedPass</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --green:#2DC98E;
      --green-dark:#22a874;
      --blue:#3B82F6;
      --purple:#8B5CF6;
      --orange:#F97316;
      --teal:#14B8A6;
      --text:#1a1a2e;
      --muted:#6B7280;
      --border:#E5E7EB;
      --bg:#F0F4F8;
      --white:#FFFFFF;
      --dark-bg:#0f1117;
      --dark-card:#1a1d27;
    }
    html{scroll-behavior:smooth;}
    body{font-family:'Inter',sans-serif;color:var(--text);background:var(--bg);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}

    /* ── NAVBAR ── */
    .navbar{
      position:sticky;top:0;z-index:200;
      background:rgba(255,255,255,0.95);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
      padding:0 5%;
      display:flex;align-items:center;justify-content:space-between;
      height:60px;
    }
    .nav-logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;color:var(--text);text-decoration:none;}
    .nav-logo-icon{width:28px;height:28px;background:var(--green);border-radius:6px;display:grid;place-items:center;}
    .nav-logo-icon svg{width:16px;height:16px;}

    /* ── MAIN CONTAINER ── */
    .main-container{
      padding:60px 5%;
      min-height:calc(100vh - 60px);
      display:flex;align-items:center;justify-content:center;
    }
    .subscription-card{
      background:#fff;
      border-radius:20px;
      padding:44px 32px;
      max-width:700px;
      width:100%;
      box-shadow:0 8px 28px rgba(0,0,0,.08);
    }

    /* ── HEADER ── */
    .back-link{
      background:transparent;
      border:none;
      cursor:pointer;
      color:var(--muted);
      font-size:14px;
      display:flex;align-items:center;gap:6px;
      text-decoration:none;
      transition:color .2s;
      padding:0;
      margin-bottom:20px;
    }
    .back-link:hover{color:var(--text);}
    .back-link svg{width:18px;height:18px;}

    /* ── ICON AND TITLE ── */
    .icon-circle{
      width:64px;height:64px;
      border-radius:16px;
      background:linear-gradient(135deg,#2DC98E,#0F766E);
      display:grid;place-items:center;
      margin:0 auto 24px;
    }
    .icon-circle svg{width:32px;height:32px;color:#fff;}

    .subscription-title{
      font-size:24px;
      font-weight:700;
      text-align:center;
      margin-bottom:6px;
    }
    .subscription-sub{
      font-size:13px;
      color:var(--muted);
      text-align:center;
      margin-bottom:32px;
    }

    /* ── PLAN ITEMS ── */
    .plan-item{
      background:#f9fafb;
      border:1.5px solid var(--border);
      border-radius:14px;
      padding:24px;
      margin-bottom:16px;
      cursor:pointer;
      transition:all .3s;
      display:flex;justify-content:space-between;align-items:center;
    }
    .plan-item:hover{
      border-color:var(--green);
      background:#fff;
      box-shadow:0 6px 20px rgba(45,201,142,.12);
    }

    .plan-content{
      flex:1;
    }
    .plan-duration{
      font-size:15px;
      font-weight:700;
      color:var(--text);
      margin-bottom:6px;
    }
    .plan-payment{
      font-size:13px;
      color:var(--muted);
    }

    .plan-price{
      font-size:20px;
      font-weight:700;
      color:var(--green);
      text-align:right;
    }

    .plan-note{
      font-size:12px;
      color:var(--muted);
      text-align:center;
      margin-top:24px;
      padding-top:24px;
      border-top:1px solid var(--border);
    }

    /* responsive */
    @media(max-width:600px){
      .subscription-card{
        padding:28px 20px;
        border-radius:16px;
      }
      .subscription-title{font-size:20px;}
      .plan-item{
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
      }
      .plan-price{text-align:left;}
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="service_activation.html" class="nav-logo">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </div>
    MedPass
  </a>
</nav>

<!-- MAIN CONTENT -->
<div class="main-container">
  <div class="subscription-card">
    <a href="service_activation.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Selection
    </a>

    <div class="icon-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8a2 2 0 0 0-2 2v2h12V5a2 2 0 0 0-2-2z"/></svg>
    </div>

    <h1 class="subscription-title">Select Subscription Plan</h1>
    <p class="subscription-sub">Public Hospital</p>

    <div onclick="selectPlan(102000)">
      <div class="plan-item">
        <div class="plan-content">
          <div class="plan-duration">1 year</div>
          <div class="plan-payment">CIB Bank Card Payment</div>
        </div>
        <div class="plan-price">102 000 DZD</div>
      </div>
    </div>

    <div onclick="selectPlan(204000)">
      <div class="plan-item">
        <div class="plan-duration">2 years</div>
        <div class="plan-payment">CIB Bank Card Payment</div>
        <div class="plan-price">204 000 DZD</div>
      </div>
    </div>

    <div onclick="selectPlan(306000)">
      <div class="plan-item">
        <div class="plan-duration">3 years</div>
        <div class="plan-payment">CIB Bank Card Payment</div>
        <div class="plan-price">306 000 DZD</div>
      </div>
    </div>

    <div class="plan-note">Select a plan to proceed to payment</div>
  </div>
</div>

<script>
  function selectPlan(amount) {
    // Store the selected amount and redirect to payment
    localStorage.setItem('paymentAmount', amount);
    window.location.href = 'payment.html';
  }
</script>

</body>
</html>
