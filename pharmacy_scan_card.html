<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scan Patient Card - MedPass Pharmacy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#2DC98E;
  --blue:#3B82F6;
  --teal:#14B8A6;
  --red:#EF4444;
  --text:#1a1a2e;
  --muted:#6B7280;
  --border:#E5E7EB;
  --white:#FFFFFF;
}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#F0F7F4 0%,#F5F3FF 100%);
  min-height:100vh;
  margin:0;
  padding:0;
}

/* ── NAVBAR ── */
.navbar{
  background:#fff;
  padding:16px 40px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  position:sticky;
  top:0;
  z-index:100;
}

.nav-brand{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  font-size:20px;
  font-weight:700;
}

.nav-brand-icon{
  width:32px;
  height:32px;
  background:var(--teal);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:18px;
}

.nav-brand-text{
  color:var(--teal);
  letter-spacing:-0.5px;
}

.nav-brand-sub{
  font-size:11px;
  color:var(--muted);
  font-weight:400;
  display:block;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:24px;
}

.nav-link{
  display:flex;
  align-items:center;
  gap:6px;
  text-decoration:none;
  color:var(--text);
  font-weight:500;
  font-size:14px;
  transition:color .2s;
}

.nav-link:hover{
  color:var(--teal);
}

/* ── MAIN CONTENT ── */
.container{
  max-width:800px;
  margin:0 auto;
  padding:40px 20px;
}

.page-header{
  margin-bottom:40px;
}

.back-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 14px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  text-decoration:none;
  font-weight:500;
  font-size:12px;
  cursor:pointer;
  transition:all .2s;
  margin-bottom:20px;
}

.back-btn:hover{
  background:#f9fafb;
  border-color:var(--muted);
}

.page-title{
  display:inline-block;
  background:var(--teal);
  color:#fff;
  padding:10px 20px;
  border-radius:10px;
  font-size:16px;
  font-weight:700;
  letter-spacing:-0.3px;
}

/* ── SCAN SECTION ── */
.scan-container{
  background:#fff;
  border-radius:14px;
  padding:40px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  text-align:center;
  margin-bottom:20px;
}

.scan-title{
  font-size:18px;
  font-weight:700;
  color:var(--text);
  margin-bottom:16px;
}

.scan-desc{
  font-size:13px;
  color:var(--muted);
  margin-bottom:40px;
}

/* ── SCANNER CIRCLE ANIMATION ── */
.scanner-circle{
  position:relative;
  width:200px;
  height:200px;
  margin:0 auto 40px;
}

.scanner-bg{
  width:200px;
  height:200px;
  background:linear-gradient(135deg,rgba(20,184,166,.05) 0%,rgba(59,130,246,.05) 100%);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid var(--teal);
  position:relative;
  animation:pulse 2s infinite;
}

.scanner-icon{
  font-size:80px;
  color:var(--teal);
  z-index:2;
}

.scanner-ring{
  position:absolute;
  width:200px;
  height:200px;
  border:2px solid var(--teal);
  border-radius:50%;
  animation:scannerScan 2s infinite;
  opacity:0.4;
}

@keyframes pulse{
  0%,100%{
    box-shadow:0 0 0 0 rgba(20,184,166,.3);
  }
  50%{
    box-shadow:0 0 0 20px rgba(20,184,166,0);
  }
}

@keyframes scannerScan{
  0%{
    width:200px;
    height:200px;
    opacity:0.4;
  }
  50%{
    width:240px;
    height:240px;
    opacity:0.1;
  }
  100%{
    width:200px;
    height:200px;
    opacity:0.4;
  }
}

/* ── INPUT FORM ── */
.scan-input-group{
  display:flex;
  gap:12px;
  margin-bottom:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.scan-input{
  flex:1;
  min-width:200px;
  max-width:300px;
  padding:12px 16px;
  border:1px solid var(--border);
  border-radius:8px;
  font-size:14px;
  font-family:'Inter',sans-serif;
  transition:all .2s;
}

.scan-input:focus{
  outline:none;
  border-color:var(--teal);
  box-shadow:0 0 0 3px rgba(20,184,166,.1);
}

.scan-btn{
  padding:12px 24px;
  background:var(--teal);
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:all .2s;
  display:flex;
  align-items:center;
  gap:8px;
}

.scan-btn:hover{
  background:#0d9488;
  transform:translateY(-2px);
}

.scan-btn:active{
  transform:translateY(0);
}

/* ── RESULTS SECTION ── */
.results-section{
  background:#fff;
  border-radius:14px;
  padding:40px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  display:none;
}

.results-section.active{
  display:block;
}

.results-title{
  font-size:16px;
  font-weight:700;
  color:var(--text);
  margin-bottom:24px;
  display:flex;
  align-items:center;
  gap:8px;
}

.card-info{
  background:#f0fdf4;
  border:1.5px solid var(--green);
  border-radius:12px;
  padding:20px;
  margin-bottom:24px;
}

.info-row{
  display:grid;
  grid-template-columns:140px 1fr;
  gap:16px;
  margin-bottom:14px;
  font-size:14px;
}

.info-row:last-child{
  margin-bottom:0;
}

.info-label{
  font-weight:600;
  color:var(--text);
}

.info-value{
  color:var(--text);
}

.info-value a{
  color:var(--blue);
  text-decoration:none;
  font-weight:500;
}

.info-value a:hover{
  text-decoration:underline;
}

.action-buttons{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
}

.action-btn{
  padding:12px 16px;
  border:none;
  border-radius:8px;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
  transition:all .2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.btn-primary{
  background:var(--teal);
  color:#fff;
}

.btn-primary:hover{
  background:#0d9488;
  transform:translateY(-2px);
}

.btn-secondary{
  background:var(--blue);
  color:#fff;
}

.btn-secondary:hover{
  background:#2563eb;
  transform:translateY(-2px);
}

.btn-ghost{
  background:#f3f4f6;
  color:var(--text);
  border:1px solid var(--border);
}

.btn-ghost:hover{
  background:#e5e7eb;
}

/* ── EMPTY STATE ── */
.empty-state{
  text-align:center;
  padding:40px 20px;
}

.empty-state-icon{
  font-size:48px;
  margin-bottom:12px;
}

.empty-state-text{
  font-size:13px;
  color:var(--muted);
}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .scan-container,
  .results-section{
    padding:24px;
  }

  .scanner-circle{
    width:150px;
    height:150px;
  }

  .scanner-bg{
    width:150px;
    height:150px;
  }

  .scanner-icon{
    font-size:60px;
  }

  .scanner-ring{
    width:150px;
    height:150px;
  }

  .info-row{
    grid-template-columns:1fr;
    gap:6px;
  }

  .action-buttons{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="#" class="nav-brand" onclick="goHome(event)">
    <div class="nav-brand-icon">💊</div>
    <div>
      <div class="nav-brand-text">MedPass</div>
      <span class="nav-brand-sub">Pharmacy Portal</span>
    </div>
  </a>
  <div class="nav-right">
    <a href="home_page.html" class="nav-link">Home</a>
    <a href="login_page.html" class="nav-link">Logout</a>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container">
  <div class="page-header">
    <a href="pharmacy_dashboard.html" class="back-btn">← Back</a>
    <div class="page-title">📱 Scan Patient Card</div>
  </div>

  <!-- SCANNER SECTION -->
  <div class="scan-container">
    <h2 class="scan-title">Scan Patient Medical Card</h2>
    <p class="scan-desc">Use NFC scanner or enter card ID manually to retrieve patient prescription information</p>

    <div class="scanner-circle">
      <div class="scanner-bg">
        <div class="scanner-ring"></div>
        <div class="scanner-icon">📱</div>
      </div>
    </div>

    <div class="scan-input-group">
      <input 
        type="text" 
        class="scan-input" 
        id="cardId" 
        placeholder="Enter Card ID or Scan..."
        autocomplete="off"
      />
      <button class="scan-btn" onclick="scanCard()">
        🔍 Scan
      </button>
    </div>
  </div>

  <!-- RESULTS SECTION -->
  <div class="results-section" id="resultsSection">
    <h3 class="results-title">✅ Patient Information</h3>

    <div class="card-info">
      <div class="info-row">
        <div class="info-label">Patient Name</div>
        <div class="info-value" id="patientName">-</div>
      </div>
      <div class="info-row">
        <div class="info-label">Patient ID</div>
        <div class="info-value" id="patientId">-</div>
      </div>
      <div class="info-row">
        <div class="info-label">Card ID</div>
        <div class="info-value" id="displayCardId">-</div>
      </div>
      <div class="info-row">
        <div class="info-label">Date of Birth</div>
        <div class="info-value" id="dateOfBirth">-</div>
      </div>
      <div class="info-row">
        <div class="info-label">Blood Type</div>
        <div class="info-value" id="bloodType">-</div>
      </div>
      <div class="info-row">
        <div class="info-label">Allergies</div>
        <div class="info-value" id="allergies">-</div>
      </div>
    </div>

    <div class="action-buttons">
      <button class="action-btn btn-primary" onclick="viewPrescriptions()">
        💊 View Prescriptions
      </button>
      <button class="action-btn btn-secondary" onclick="viewMedicalHistory()">
        📋 Medical History
      </button>
      <button class="action-btn btn-ghost" onclick="clearResults()">
        Scan Another Card
      </button>
    </div>
  </div>
</div>

<script>
const patientDatabase = {
  'MP-123456': {
    name: 'Ahmed Benali',
    patientId: 'MP-123456',
    dob: '1985-05-15',
    bloodType: 'O+',
    allergies: 'Penicillin'
  },
  'MP-789012': {
    name: 'Fatima Al-Zahra',
    patientId: 'MP-789012',
    dob: '1992-08-22',
    bloodType: 'B+',
    allergies: 'Sulfa drugs'
  },
  'MP-345678': {
    name: 'Mohammed Al-Salem',
    patientId: 'MP-345678',
    dob: '1978-03-10',
    bloodType: 'A+',
    allergies: 'None'
  }
};

function formatDate(dateStr) {
  const date = new Date(dateStr);
  return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

function scanCard() {
  const cardId = document.getElementById('cardId').value.trim().toUpperCase();
  
  if (!cardId) {
    alert('Please enter or scan a card ID');
    return;
  }

  const patient = patientDatabase[cardId];
  
  if (!patient) {
    alert(`Card ID ${cardId} not found. Try one of these:\n${Object.keys(patientDatabase).join(', ')}`);
    return;
  }

  // Display patient information
  document.getElementById('patientName').textContent = patient.name;
  document.getElementById('patientId').textContent = patient.patientId;
  document.getElementById('displayCardId').textContent = cardId;
  document.getElementById('dateOfBirth').textContent = formatDate(patient.dob);
  document.getElementById('bloodType').textContent = patient.bloodType;
  document.getElementById('allergies').textContent = patient.allergies;

  // Show results section
  document.getElementById('resultsSection').classList.add('active');
  document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function viewPrescriptions() {
  const patientId = document.getElementById('patientId').textContent;
  alert(`View prescriptions for patient: ${patientId}`);
  // In a real app, this would navigate to the prescriptions page
}

function viewMedicalHistory() {
  const patientId = document.getElementById('patientId').textContent;
  alert(`View medical history for patient: ${patientId}`);
  // In a real app, this would navigate to the medical history page
}

function clearResults() {
  document.getElementById('cardId').value = '';
  document.getElementById('resultsSection').classList.remove('active');
  document.getElementById('cardId').focus();
}

function goHome(event) {
  if (event) event.preventDefault();
  window.location.href = 'home_page.html';
}

// Enable scanning with Enter key
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('cardId').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      scanCard();
    }
  });
});
</script>

</body>
</html>
